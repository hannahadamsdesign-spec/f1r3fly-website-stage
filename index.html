<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1R3FLY.IO — Spatial Navigation Concept</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--surface:#060610;--border:#1a1a30;--stroke:#1c1c32;
--text:#fff;--text-light:#aaa;--text-faint:#555;--text-dim:#333;
--yellow:#F3D630;--sage:#8BB999;--sky:#3FA9F5;
--dev-blue:#007bc4;--dev-teal:#009188;
--client-purple:#5c0269;--client-scarlet:#7b0429;
--partner-green:#0c8e23;--partner-lime:#7a9d0e;
--heading:'Josefin Sans',sans-serif;--body:'Source Sans Pro',sans-serif;
--ease:cubic-bezier(0.4,0,0.15,1)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
</style>
<style>
.floating-logo{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.7;transition:opacity .3s}
.floating-logo:hover{opacity:1}
.floating-logo img{height:28px}
.floating-logo span{font-family:var(--heading);font-size:9px;color:#444;letter-spacing:3px;text-transform:uppercase}
.stage{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden}
.world{position:absolute;top:0;left:0;transition:transform .7s var(--ease);transform-origin:0 0}
.slide{position:absolute;top:0;width:1920px;height:1080px;cursor:pointer;border-radius:6px;overflow:hidden;border:1px solid var(--stroke);box-shadow:0 0 0 1px rgba(255,255,255,.03)}
.slide:hover{border-color:#2a2a44}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;z-index:100}
.ctrl-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:50%;background:rgba(0,0,0,.85);color:var(--text-faint);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.ctrl-btn:hover{color:var(--yellow);border-color:var(--yellow)}
.ctrl-btn.nav-arrow{width:38px;height:38px}
.ctrl-indicator{font-size:10px;color:var(--text-faint);letter-spacing:2px;font-weight:300;min-width:60px;text-align:center;font-family:var(--heading)}
.ctrl-btn:disabled{opacity:.15;cursor:default}
</style>
<style>
/* ── S1: Hero ── */
.s1{height:100%;background:radial-gradient(ellipse at 50% 60%,#0c0c1a 0%,#000 65%);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px}
.s1 img.logo{height:160px;margin-bottom:32px;opacity:.85}
.s1 .sub{font-family:var(--heading);font-size:13px;color:#555;letter-spacing:3px;margin-bottom:48px}
.s1 .sub a{color:var(--sky);text-decoration:none}
.s1 h2{font-family:var(--heading);font-size:36px;font-weight:300;color:var(--text-light);line-height:1.5;max-width:900px;margin-bottom:32px}
.s1 h2 strong{color:#fff;font-weight:600}
.s1 .body-text{font-size:20px;color:#666;max-width:800px;line-height:1.7;font-weight:300}

/* ── S2: Audiences (Dev/Client/Partner gradient panels) ── */
.s2{display:grid;grid-template-columns:1fr 1fr 1fr;height:100%}
.s2 .panel{padding:80px 60px;display:flex;flex-direction:column;justify-content:center;gap:20px;position:relative;overflow:hidden}
.s2 .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.s2 .dev{background:linear-gradient(180deg,#040810,#060610)}
.s2 .dev::before{background:linear-gradient(90deg,var(--dev-blue),var(--dev-teal))}
.s2 .client{background:linear-gradient(180deg,#080410,#060610)}
.s2 .client::before{background:linear-gradient(90deg,var(--client-purple),var(--client-scarlet))}
.s2 .partner{background:linear-gradient(180deg,#040a06,#060610)}
.s2 .partner::before{background:linear-gradient(90deg,var(--partner-green),var(--partner-lime))}
.s2 .eyebrow{font-family:var(--heading);font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.s2 h3{font-family:var(--heading);font-size:32px;font-weight:400;line-height:1.3}
.s2 p{font-size:17px;font-weight:300;color:var(--text-light);line-height:1.7}
.s2 ul{list-style:none;padding:0;margin-top:8px}
.s2 li{font-size:15px;color:var(--text-light);padding:5px 0 5px 20px;position:relative}
.s2 li::before{content:'→';position:absolute;left:0;color:var(--text-faint)}
.s2 .demo-link{display:inline-block;margin-top:16px;font-family:var(--heading);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--sky);text-decoration:none;border-bottom:1px solid var(--sky);padding-bottom:2px}
</style>
<style>
/* ── S3: Technology pillars ── */
.s3{height:100%;background:#050510;display:flex;flex-direction:column;justify-content:center;padding:80px 100px;gap:24px}
.s3 .eyebrow{font-family:var(--heading);font-size:11px;letter-spacing:4px;color:#444;text-transform:uppercase}
.s3 h2{font-family:var(--heading);font-size:38px;font-weight:300;color:var(--text-light);max-width:850px;line-height:1.4;margin-bottom:8px}
.s3 .body{font-size:18px;color:#555;max-width:800px;line-height:1.7;font-weight:300;margin-bottom:16px}
.tech-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.tc{background:#08080f;border:1px solid var(--border);border-radius:8px;padding:40px 36px}
.tc .icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.tc .icon img{width:26px;height:26px;opacity:.8}
.tc h4{font-family:var(--heading);font-size:20px;font-weight:600;margin-bottom:10px;letter-spacing:.5px}
.tc p{font-size:15px;color:var(--text-light);line-height:1.7;font-weight:300}
.tc ul{list-style:none;padding:0;margin-top:12px}
.tc li{font-size:14px;color:#777;padding:4px 0 4px 16px;position:relative}
.tc li::before{content:'•';position:absolute;left:0;color:var(--text-faint)}

/* ── S4: Rholang ── */
.s4{display:grid;grid-template-columns:1.1fr 1fr;height:100%}
.s4l{padding:80px 70px;display:flex;flex-direction:column;justify-content:center;gap:20px;background:#050510}
.s4l .eyebrow{font-family:var(--heading);font-size:11px;letter-spacing:4px;color:#444;text-transform:uppercase}
.s4l h2{font-family:var(--heading);font-size:44px;font-weight:300;line-height:1.25}
.s4l h2 em{color:var(--sky);font-style:normal}
.s4l p{font-size:18px;font-weight:300;color:var(--text-light);line-height:1.7;max-width:540px}
.s4r{background:#030308;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:60px}
.code{background:#08080f;border:1px solid var(--border);border-radius:8px;padding:36px;font-family:'SF Mono','Fira Code',monospace;font-size:14px;color:var(--sage);line-height:2.2;width:100%;max-width:460px}
.code .k{color:var(--sky)} .code .s{color:var(--yellow)} .code .c{color:#333}
.feat-row{display:flex;gap:48px}
.feat-item{text-align:center}
.feat-item img{width:44px;height:44px;opacity:.5;margin-bottom:8px}
.feat-item span{display:block;font-family:var(--heading);font-size:10px;color:#444;letter-spacing:2px}
</style>
<style>
/* ── S5: Team ── */
.s5{height:100%;background:#050510;display:flex;flex-direction:column;padding:60px 80px;gap:32px}
.s5 .eyebrow{font-family:var(--heading);font-size:11px;letter-spacing:4px;color:#444;text-transform:uppercase;text-align:center}
.s5 h2{font-family:var(--heading);font-size:40px;font-weight:300;text-align:center}
.s5 .desc{font-size:17px;color:#666;text-align:center;max-width:700px;margin:0 auto;line-height:1.6;font-weight:300}
.tg{display:grid;grid-template-columns:repeat(5,1fr);gap:28px;margin-top:8px}
.tm{display:flex;flex-direction:column;align-items:center;gap:10px}
.tm img{width:96px;height:96px;border-radius:50%;object-fit:cover;border:1px solid var(--border);background:#111}
.tm .nm{font-family:var(--heading);font-size:14px;font-weight:600;letter-spacing:1px}
.tm .rl{font-size:12px;color:var(--text-faint);font-weight:300}
.s5 .contrib{font-family:var(--heading);font-size:11px;letter-spacing:3px;color:#333;text-transform:uppercase;text-align:center;margin-top:16px}
.tg2{display:grid;grid-template-columns:repeat(5,1fr);gap:20px}
.tm2{display:flex;flex-direction:column;align-items:center;gap:6px}
.tm2 img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:1px solid #1a1a2a;background:#0a0a12}
.tm2 .nm{font-family:var(--heading);font-size:11px;font-weight:400;color:#555}
.tm2 .rl{font-size:10px;color:#333}
.marquee-wrap{width:100%;overflow:hidden;margin-top:auto}
.marquee{font-family:var(--heading);font-size:12px;color:#151520;letter-spacing:4px;white-space:nowrap;animation:m 25s linear infinite}
@keyframes m{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
</style>

<div class="floating-logo" onclick="goOverview()">
  <img src="https://f1r3fly.io/images/f1r3fly-io-horizontal-logo-color-on-dark.svg" alt="F1R3FLY.IO">
  <span>Spatial Navigation Concept</span>
</div>
<div class="stage"><div class="world" id="world"></div></div>
<div class="controls">
  <button class="ctrl-btn nav-arrow" id="btnPrev" onclick="goPrev()">&#8592;</button>
  <button class="ctrl-btn" onclick="doZoomOut()">&#8722;</button>
  <span class="ctrl-indicator" id="indicator">Overview</span>
  <button class="ctrl-btn" onclick="doZoomIn()">+</button>
  <button class="ctrl-btn nav-arrow" id="btnNext" onclick="goNext()">&#8594;</button>
</div>
<script>
var I='https://f1r3fly.io/images/';
var SLIDES=[
// S1: Hero
'<div class="s1"><img class="logo" src="'+I+'f1r3fly-io-vertical-logo.svg"><div class="sub">A Subsidiary of <a>F1R3FLY Industries</a></div><h2>A <strong>verifiable execution layer</strong> for AI&#8209;native systems, concurrent workflows, and high&#8209;trust coordination.</h2><p class="body-text">F1R3FLY is an AI&#8209;native execution layer built on Rholang and validator nodes. It is designed for teams that need more than another chain: they need verifiable concurrency, safe composition of AI and Web3, and infrastructure that can explain what actually happened.</p></div>',

// S2: Audiences
'<div class="s2"><div class="panel dev"><div class="eyebrow" style="color:var(--sky)">Developers</div><h3>From global state chaos to verifiable concurrency</h3><p>F1R3FLY provides a concurrency&#8209;native model to run processes in parallel with a verifiable record of every interaction.</p><ul><li>Model complex workflows without shared&#8209;state hacks</li><li>Connect on&#8209;chain logic to off&#8209;chain services seamlessly</li><li>Debug with tamper&#8209;evident records, not guesswork</li></ul><a class="demo-link">Watch Shard Controller Demo &#8594;</a></div><div class="panel client"><div class="eyebrow" style="color:var(--client-scarlet)">Clients</div><h3>Connect AI, data, and Web3 without fragile glue</h3><p>Skip fragile one&#8209;off integrations. F1R3FLY composes AI calls, smart contracts, and data as repeatable workflows on validator&#8209;backed infrastructure.</p><ul><li>Manage data flow across AI and services in one place</li><li>Tamper&#8209;evident records of what was executed, when, and by whom</li><li>Less maintenance, more time shipping features</li></ul></div><div class="panel partner"><div class="eyebrow" style="color:var(--partner-green)">Partners</div><h3>Infrastructure for high&#8209;trust, AI&#8209;native ecosystems</h3><p>Partners need an environment where AI and data work under clear rules of evidence.</p><ul><li>A credible technical story for AI&#8209;native networks</li><li>Transparency and auditability for complex workflows</li><li>A foundation from pilot to production&#8209;grade scale</li></ul><a class="demo-link" style="color:var(--partner-green);border-color:var(--partner-green)">Watch All Demos &#8594;</a></div></div>',

// S3: Technology
'<div class="s3"><div class="eyebrow">Scalable. Storable. Searchable.</div><h2>An AI&#8209;native execution layer for mission&#8209;critical coordination systems</h2><p class="body">F1R3FLY provides developers with concurrency&#8209;native execution, validator&#8209;backed data, and formally grounded Rholang contracts, ensuring real&#8209;world, data&#8209;heavy workloads remain fast and verifiable.</p><div class="tech-cards"><div class="tc"><div class="icon" style="background:rgba(63,169,245,.1)"><img src="'+I+'icon-math.svg"></div><h4>Concurrency&#8209;Native Scalability</h4><p>No single global state or transaction queue to fight with. Transactions execute concurrently across validators.</p><ul><li>Capacity scales with hardware and network topology</li><li>No global bottleneck</li></ul></div><div class="tc"><div class="icon" style="background:rgba(139,185,153,.1)"><img src="'+I+'icon-search-scale.svg"></div><h4>Validator&#8209;Backed Data</h4><p>Application state and key datasets live directly on the network. Verifiable logs that AI agents and services can trust.</p><ul><li>Built&#8209;in auditability and replay</li><li>Regulated, high&#8209;trust scenarios</li></ul></div><div class="tc"><div class="icon" style="background:rgba(243,214,48,.1)"><img src="'+I+'icon-rebuild.svg"></div><h4>Correct&#8209;by&#8209;Construction</h4><p>Smart contracts written in Rholang with strong concurrency semantics. Behavior modeled as processes and channels.</p><ul><li>Reduces race conditions</li><li>Simplifies complex logic</li></ul></div></div></div>',

// S4: Rholang
'<div class="s4"><div class="s4l"><div class="eyebrow">Deep dive into Rholang and Concurrency</div><h2>Concurrent by design, secure by <em>math</em></h2><p>Rholang is a concurrent smart contract language based on the rho&#8209;calculus, a formal model for communicating processes. Instead of mutating global variables, Rholang contracts send and receive messages over channels.</p><p style="color:#555;font-size:16px;margin-top:4px"><strong style="color:#777">Spatial&#8209;behavioral types</strong> &#8212; a mathematical framework that lets you prove properties of contracts before they touch mainnet, catching whole classes of bugs by construction.</p><p style="color:#555;font-size:16px;margin-top:4px"><strong style="color:#777">OSLF Algorithm</strong> &#8212; dramatically expands what can be searched and indexed on&#8209;chain by reasoning about processes instead of static data.</p><p style="color:#555;font-size:16px;margin-top:4px"><strong style="color:#777">Casper Consensus</strong> &#8212; a Proof&#8209;of&#8209;Stake protocol that is energy&#8209;efficient, finality&#8209;oriented, and grounded in peer&#8209;reviewed research.</p></div><div class="s4r"><div class="code"><span class="c">// Rholang contract</span><br><span class="k">new</span> channel <span class="k">in</span> {<br>&nbsp;&nbsp;channel!(<span class="s">"hello"</span>) |<br>&nbsp;&nbsp;<span class="k">for</span> (msg &lt;- channel) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="c">// concurrent receive</span><br>&nbsp;&nbsp;&nbsp;&nbsp;stdout!(*msg)<br>&nbsp;&nbsp;}<br>}</div><div class="feat-row"><div class="feat-item"><img src="'+I+'icon-math.svg"><span>Rholang</span></div><div class="feat-item"><img src="'+I+'icon-search-scale.svg"><span>OSLF</span></div><div class="feat-item"><img src="'+I+'icon-rebuild.svg"><span>Casper</span></div></div><p style="font-size:15px;color:#333;text-align:center;max-width:400px;line-height:1.6">Legacy chains execute transactions one after another, turning global state into a single bottleneck. F1R3FLY follows a different path.</p></div></div>',

// S5: Team
'<div class="s5"><div class="eyebrow">The People Behind the Platform</div><h2>Team</h2><p class="desc">F1R3FLY is built by a small team of researchers, engineers, and product people who have spent years thinking about concurrent computation, smart contract safety, and real&#8209;world systems.</p><div class="tg"><div class="tm"><img src="'+I+'greg-meredith.jpg"><div class="nm">Greg Meredith</div><div class="rl">Founder</div></div><div class="tm"><img src="'+I+'stephen-alexander.jpg"><div class="nm">Stephen Alexander</div><div class="rl">President and CEO</div></div><div class="tm"><img src="'+I+'mike-stay.jpg"><div class="nm">Mike Stay</div><div class="rl">Director of Research</div></div><div class="tm"><img src="'+I+'jeff-turner.jpg"><div class="nm">Jeff Turner</div><div class="rl">Product Manager</div></div><div class="tm"><img src="'+I+'nicolas-riddle.jpg"><div class="nm">Nicolas Riddle</div><div class="rl">Board Director &amp; COO</div></div><div class="tm"><img src="'+I+'hannah-adams.jpg"><div class="nm">Hannah Adams</div><div class="rl">Creative Director</div></div><div class="tm"><img src="'+I+'lilia-rusu.jpg"><div class="nm">Lilia Rusu</div><div class="rl">General Manager</div></div><div class="tm"><img src="'+I+'ralph-benko.jpg"><div class="nm">Ralph Benko</div><div class="rl">General Counsel</div></div><div class="tm"><img src="'+I+'dylon-edwards.jpg"><div class="nm">Dylon Edwards</div><div class="rl">Language Tools</div></div><div class="tm"><img src="'+I+'steven-preston.jpg"><div class="nm">Steven Preston</div><div class="rl">Integration Team</div></div></div><div class="contrib">Contributors</div><div class="tg2"><div class="tm2"><img src="'+I+'daria-bohdanova.jpg"><div class="nm">Daria Bohdanova</div></div><div class="tm2"><img src="'+I+'serhii-lypko.jpg"><div class="nm">Serhii Lypko</div></div><div class="tm2"><img src="'+I+'christian-b-wells.jpg"><div class="nm">Christian Wells</div></div><div class="tm2"><img src="'+I+'adam-vandervorst.jpg"><div class="nm">Adam Vandervorst</div></div><div class="tm2"><img src="'+I+'nash-foster.jpg"><div class="nm">Nash Foster</div></div></div><div class="marquee-wrap"><div class="marquee">the network is the computer is the network is the computer is the network is the computer is the network is the computer is the network is the computer is the network is the computer is the network is the computer is the network is the computer is </div></div></div>'
];

var COLS=3,ROWS=2,SW=1920,SH=1080,GAP=40;
var currentSlide=-1,zoomLevel=0;
var world=document.getElementById('world');
SLIDES.forEach(function(html,i){var col=i%COLS,row=Math.floor(i/COLS);var el=document.createElement('div');el.className='slide';el.style.left=(col*(SW+GAP))+'px';el.style.top=(row*(SH+GAP))+'px';el.innerHTML=html;el.addEventListener('click',function(){goSlide(i)});world.appendChild(el)});
var worldW=COLS*SW+(COLS-1)*GAP,worldH=ROWS*SH+(ROWS-1)*GAP;
function getStageSize(){return{w:window.innerWidth,h:window.innerHeight}}
function getOverviewScale(){var s=getStageSize(),p=64;return Math.min((s.w-p*2)/worldW,(s.h-p*2)/worldH)}
function getSlideScale(){var s=getStageSize(),p=40;return Math.min((s.w-p*2)/SW,(s.h-p*2)/SH)}
function getSlideCenter(i){var c=i%COLS,r=Math.floor(i/COLS);return{x:c*(SW+GAP)+SW/2,y:r*(SH+GAP)+SH/2}}
function applyTransform(sc,fx,fy){var s=getStageSize();world.style.transform='translate('+(s.w/2-fx*sc)+'px,'+(s.h/2-fy*sc)+'px) scale('+sc+')'}
function goOverview(){currentSlide=-1;zoomLevel=0;applyTransform(getOverviewScale(),worldW/2,worldH/2);updateUI()}
function goSlide(i){currentSlide=i;zoomLevel=1;var c=getSlideCenter(i);applyTransform(getSlideScale(),c.x,c.y);updateUI()}
function goPrev(){if(currentSlide<=0)return;goSlide(currentSlide-1)}
function goNext(){if(currentSlide>=SLIDES.length-1)return;goSlide(currentSlide+1)}
function doZoomIn(){if(currentSlide<0){goSlide(0);return}zoomLevel=Math.min(zoomLevel+.3,2.5);var c=getSlideCenter(currentSlide);applyTransform(getSlideScale()*zoomLevel,c.x,c.y);updateUI()}
function doZoomOut(){if(currentSlide<0)return;zoomLevel=Math.max(zoomLevel-.3,0);if(zoomLevel<.5){goOverview();return}var c=getSlideCenter(currentSlide);applyTransform(getSlideScale()*zoomLevel,c.x,c.y);updateUI()}
function updateUI(){var ind=document.getElementById('indicator');ind.textContent=currentSlide<0?'Overview':(currentSlide+1)+' / '+SLIDES.length;document.getElementById('btnPrev').disabled=(currentSlide<=0);document.getElementById('btnNext').disabled=(currentSlide>=SLIDES.length-1||currentSlide<0)}
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')goPrev();if(e.key==='ArrowRight')goNext();if(e.key==='='||e.key==='+'){e.preventDefault();doZoomIn()}if(e.key==='-'){e.preventDefault();doZoomOut()}if(e.key==='Escape')goOverview()});
window.addEventListener('resize',function(){if(currentSlide<0)goOverview();else goSlide(currentSlide)});
goOverview();
</script>
</body>
</html>
