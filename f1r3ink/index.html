<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ══════════════════════════════════════════════════════════════
// F1R3INK — Branded Prototype (Static Mockup)
// F1R3FLY Brand Book March 27, 2026 — Hannah Adams
// ══════════════════════════════════════════════════════════════

const BRAND = { yellow:"#F3D630", sage:"#8BB999", sky:"#3FA9F5", border:"rgba(255,255,255,0.2)", stroke:"linear-gradient(90deg, #F3D630, #8BB999)" };
const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');`;
const FH = "'Josefin Sans', sans-serif";
const FB = "'Source Sans 3', sans-serif";
const INK_ACCENT = "#DC2547";
const INK_COLORS = [
  {hex:"#FF2D55",name:"rose"},{hex:"#FF6B2B",name:"ember"},{hex:"#FFD60A",name:"gold"},
  {hex:"#30D158",name:"verdant"},{hex:"#00C7BE",name:"teal"},{hex:"#40C8E0",name:"sky"},
  {hex:"#5E5CE6",name:"indigo"},{hex:"#BF5AF2",name:"violet"},{hex:"#FF375F",name:"coral"},

];

const PORTRAITS = {

  grok: "images/lilia-rusu.jpg",
  llama: "images/jeff-turner.jpg",
  scarlet: "images/stephen-alexander.jpg"
};

// Demo players — static data, no storage

  { id:"claude", name:"Greg", tags:["founder","rho-calculus"], isAI:false, portrait:PORTRAITS.claude,

function Avatar({src, size=48}) {
  return <img src={src} alt="" style={{width:size, height:size, borderRadius:"50%", objectFit:"cover", border:"2px solid rgba(255,255,255,0.15)", flexShrink:0}} />;
}

function AIIcon({size=14, color=BRAND.sky}) {
  return (<svg width={size} height={size} viewBox="0 0 16 16" fill="none">
    <rect x="3" y="3" width="10" height="10" rx="2" stroke={color} strokeWidth="1.3" fill="none"/>
    <circle cx="6.5" cy="7.5" r="1" fill={color}/><circle cx="9.5" cy="7.5" r="1" fill={color}/>
    <path d="M6 10.5c0 0 .8 1 2 1s2-1 2-1" stroke={color} strokeWidth="1" fill="none" strokeLinecap="round"/>
    <line x1="8" y1="1" x2="8" y2="3" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
  </svg>);
}

function HumanIcon({size=14, color="#fff"}) {
  return (<svg width={size} height={size} viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="5" r="3" stroke={color} strokeWidth="1.5" fill="none"/>
    <path d="M2.5 15c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
  </svg>);
}

// HOW THIS WORKS button — neutral dark, NOT gradient (avoids competing with JOIN)
function HowBtn({onClick}) {
  return <button onClick={onClick} style={{background:"#000", border:`1px solid ${BRAND.border}`, color:"#fff", borderRadius:20, padding:"10px 24px", fontSize:16, cursor:"pointer", fontFamily:FH, letterSpacing:2, fontWeight:400, display:"inline-flex", alignItems:"center", justifyContent:"center", lineHeight:1, minHeight:38}}>HOW THIS WORKS</button>;
}

// Tour overlay
function TourOverlay({onClose}) {
  const slides = [
    { title:"INK IS FEELING\nMADE VISIBLE", body:"Choose a color. Send it to someone. That's an ink — a non-verbal signal that says something words can't. Not a like. Not a vote. A feeling." },
    { title:"YOUR F1R3SIGN TRAVELS\nWITH YOU", body:"Your F1R3Sign isn't locked to this game. It moves with you across every service built on F1R3FLY. One sign, one reputation, everywhere." },
    { title:"YOUR FLAG\nTELLS YOUR STORY", body:"Every ink you receive becomes a stripe on your flag. Over time, your flag becomes a portrait painted by your community — not by you." },
    { title:"BUILT ON\nF1R3FLY", body:"F1R3INK runs on F1R3FLY's shared computing layer. Every ink is a real transaction on a real shard. No central server. No single point of failure." }
  ];
  const [si, setSi] = useState(0);
  const s = slides[si];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FH}} onClick={onClose}>
      <style>{`@keyframes tourIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}`}</style>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:480,width:"90%",padding:"48px 40px",border:`1px dashed ${BRAND.sky}44`,borderRadius:14,background:"#000",animation:"tourIn 0.3s ease-out",textAlign:"center"}}>
        <h2 style={{fontSize:22,fontWeight:700,letterSpacing:4,color:"#fff",lineHeight:1.5,whiteSpace:"pre-line",margin:"0 0 20px"}}>{s.title}</h2>
        <p style={{fontSize:14,color:"#999",lineHeight:1.8,fontFamily:FB,margin:0}}>{s.body}</p>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:32}}>
          {slides.map((_,i)=><div key={i} onClick={()=>setSi(i)} style={{width:8,height:8,borderRadius:"50%",background:i===si?INK_ACCENT:"#333",cursor:"pointer"}} />)}
        </div>
        <div style={{marginTop:24}}>
          {si < slides.length-1
            ? <button onClick={()=>setSi(si+1)} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"10px 28px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:2,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38}}>NEXT</button>
            : <button onClick={onClose} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"10px 28px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:2,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38}}>LET'S GO</button>}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function F1R3Ink() {
  const [phase, setPhase] = useState("join");
  const [myName, setMyName] = useState("");
  const [myTags, setMyTags] = useState("");
  const [showTour, setShowTour] = useState(false);
  const [selectedTarget, setSelectedTarget] = useState(null);
  const [selectedColor, setSelectedColor] = useState(null);

  // ── JOIN SCREEN ──────────────────────────────────────────
  if (phase === "join") return (
    <div style={{height:"100vh",overflow:"hidden",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",fontFamily:FH,position:"relative"}}>
      <style>{FONTS}{`@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}} input:focus{border-color:${BRAND.sky}66 !important;outline:none}`}</style>
      <div style={{animation:"fadeIn .6s ease-out",textAlign:"center",marginTop:-75,position:"relative",zIndex:1}}>
        <F1R3GamesLogo width={196}/>
        <div style={{fontSize:10,color:"#fff",letterSpacing:6,fontFamily:FH,fontWeight:400,marginTop:24}}>PRESENTS</div>
        <div style={{height:40}}/>
        <div style={{border:`1px dashed ${BRAND.sky}66`,borderRadius:14,padding:"40px 48px",display:"inline-block",background:"#000"}}>
          <h1 style={{margin:"0 0 12px",fontSize:68,fontWeight:700,letterSpacing:8,color:"#fff",fontFamily:FH}}>F1R3<span style={{color:INK_ACCENT}}>INK</span></h1>
          <div style={{fontSize:10,color:"#fff",letterSpacing:4,fontWeight:400,fontFamily:FH}}>YOUR TRUE COLORS COME SHINING THROUGH</div>
        </div>
        <div style={{height:50}}/>
        <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          <div style={{fontSize:13,color:BRAND.yellow,letterSpacing:4,fontWeight:700,fontFamily:FH}}>CHOOSE YOUR F1R3SIGN</div>
          <input value={myName} onChange={e=>setMyName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&myName.trim()&&setPhase("play")} placeholder="someone colorful" style={{background:"#000",border:`1px dashed ${BRAND.sky}66`,borderRadius:6,color:"#fff",padding:"10px 16px",fontSize:16,fontWeight:300,width:"100%",maxWidth:460,fontFamily:FH,textAlign:"center",outline:"none",marginTop:20}}/>
          <input value={myTags} onChange={e=>setMyTags(e.target.value)} placeholder="tags: mood, vibe, role..." style={{background:"#000",border:`1px dashed ${BRAND.sky}33`,borderRadius:6,color:"#888",padding:"8px 16px",fontSize:12,width:"100%",maxWidth:460,fontFamily:FH,textAlign:"center",outline:"none"}}/>
          <button onClick={()=>myName.trim()&&setPhase("play")} style={{background:"linear-gradient(135deg, #5c0269, #7b0429)",color:"#fff",border:"none",borderRadius:20,padding:"10px 32px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:3,boxShadow:"0 0 20px rgba(123,4,41,0.4)",marginTop:20,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38}}>JOIN</button>
          <div style={{fontSize:10,color:"#fff",letterSpacing:4,fontWeight:400,fontFamily:FH,lineHeight:2.2,marginTop:20}}>YOUR F1R3SIGN TRAVELS<br/>WITH YOU ACROSS F1R3FLY</div>
          <div style={{marginTop:12}}><HowBtn onClick={()=>setShowTour(true)}/></div>
        </div>
        {DEMO_PLAYERS.length > 0 && <div style={{marginTop:16,color:"#555",fontSize:16}}>{DEMO_PLAYERS.length} playing</div>}
      </div>
      <BuiltOnBadge/>
      {showTour && <TourOverlay onClose={()=>setShowTour(false)}/>}
    </div>
  );

  // ── GAME VIEW ──────────────────────────────────────────────
  const displayName = myName.trim() || "Hannah";
  const totalInks = DEMO_PLAYERS.reduce((a,p) => a + p.inks.length, 0) + MY_INKS.length;

  return (
    <div style={{minHeight:"100vh",background:"#000",color:"#fff",fontFamily:FH,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <style>{FONTS}{`::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px} *{box-sizing:border-box}`}</style>

      {/* Header */}
      <div className="game-header" style={{padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#000",minHeight:70}}>
        <div style={{display:"flex",alignItems:"baseline",gap:12}}>
          <span style={{fontSize:29,fontWeight:700,letterSpacing:4,fontFamily:FH,color:"#fff"}}>F1R3<span style={{color:INK_ACCENT}}>INK</span></span>
          <span style={{fontSize:16,color:"#fff",letterSpacing:2,fontFamily:FB}}>{DEMO_PLAYERS.length + 1} players | {totalInks} inks | shard live</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <HowBtn onClick={()=>setShowTour(true)}/>
          <button onClick={()=>setPhase("join")} style={{background:"none",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:4,padding:"6px 12px",fontSize:16,cursor:"pointer",fontFamily:FH,letterSpacing:1}}>LEAVE</button>
        </div>
      </div>

      {/* Gradient stroke */}
      <div style={{width:"100%",height:"0.5px",background:BRAND.stroke,opacity:0.8}}/>

      {/* 3-column layout */}
      <div className="game-layout" style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Left Sidebar — My Flag */}
        <div className="game-sidebar game-sidebar-left" style={{width:300,minWidth:300,flexShrink:0,borderRight:`1px solid ${BRAND.border}`,padding:"20px 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:16,overflowY:"auto",background:"#000"}}>
          <div style={{fontSize:16,color:BRAND.sage,letterSpacing:3}}>MY FLAG</div>
          <Avatar src={PORTRAITS.hannah} size={80}/>
          <div style={{fontSize:18,color:"#fff",fontWeight:600}}>{displayName}</div>

          <div style={{width:"100%",maxWidth:240}}>
            <div style={{fontSize:11,color:"#444",marginBottom:4,letterSpacing:1,textTransform:"uppercase"}}>TAGS</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {(myTags.trim() ? myTags.split(",").map(t=>t.trim()).filter(Boolean) : ["Pooh"]).map((t,i) =>
                <span key={i} style={{background:"#0c0c18",border:`1px solid ${BRAND.border}`,borderRadius:20,padding:"1px 10px",fontSize:11,color:BRAND.sage}}>{t}</span>
              )}
            </div>
          </div>

          {/* F1R3 SIGNALS card */}
          <div style={{width:"100%",maxWidth:240,padding:14,borderRadius:6,border:`1px solid ${BRAND.sky}33`,background:"rgba(63,169,245,0.04)"}}>
            <div style={{fontSize:16,color:BRAND.sky,letterSpacing:3,marginBottom:4,fontWeight:600}}>F1R3 SIGNALS</div>
            <div style={{fontSize:13,color:"#fff",fontFamily:FB,marginBottom:10,fontWeight:300,letterSpacing:1}}>not a like button — a feeling</div>
            {selectedTarget
              ? <div style={{fontSize:13,color:"#fff",fontFamily:FB,marginBottom:10}}>How do you feel about <span style={{color:INK_ACCENT,fontWeight:600}}>{DEMO_PLAYERS.find(p=>p.id===selectedTarget)?.name}</span>?</div>
              : <div style={{fontSize:13,color:"#888",fontFamily:FB,marginBottom:10,fontStyle:"italic"}}>select someone to ink</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(6, 1fr)",gap:"10px 6px",justifyItems:"center"}}>
              {INK_COLORS.map(c => (
                <div key={c.hex} title={c.name} onClick={()=>setSelectedColor(c.hex)} style={{width:24,height:24,borderRadius:"50%",background:c.hex,cursor:"pointer",border:selectedColor===c.hex?"2px solid #fff":c.hex==="#1C1C1E"?"1px solid #444":"1px solid rgba(255,255,255,0.1)",transition:"transform 0.15s",transform:selectedColor===c.hex?"scale(1.3)":"scale(1)"}}/>
              ))}
            </div>
            {selectedColor && selectedTarget && (
              <div style={{textAlign:"center",marginTop:10}}>
                <button style={{background:selectedColor,color:(selectedColor==="#FFD60A"||selectedColor==="#FFFFFF")?"#111":"#fff",border:"none",borderRadius:20,padding:"10px 32px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:3,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,boxShadow:`0 0 20px ${selectedColor}44`}}>INK</button>
              </div>
            )}
            <div style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:FB,fontStyle:"italic"}}>this is F1R3INK</div>
          </div>

          {/* Inked By section */}
          {MY_INKS.length > 0 ? (
            <div style={{width:"100%",maxWidth:240}}>
              <div style={{fontSize:11,color:"#444",letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>INKED BY</div>
              {MY_INKS.map((s,i) => (
                <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:s.color,flexShrink:0}}/>
                  <span style={{fontSize:11,color:"#888",fontFamily:FB}}>{s.from}</span>
                </div>
              ))}
            </div>
          ) : (
            <div style={{color:"#444",fontSize:12,fontStyle:"italic",textAlign:"center",marginTop:20,lineHeight:1.6,fontFamily:FB}}>no ink yet<br/><span style={{fontSize:10}}>others will color your flag</span></div>
          )}
        </div>

        {/* Center — Community */}
        <div style={{flex:1,overflowY:"auto",padding:"24px 32px",background:"#000"}}>
          <div style={{fontSize:16,color:BRAND.yellow,letterSpacing:3,marginBottom:20}}>COMMUNITY WHEEL</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:20}}>
            {/* My card */}
            <div style={{padding:20,borderRadius:8,border:`1px solid ${BRAND.border}`,background:"rgba(255,255,255,0.02)",textAlign:"center"}}>
              <Avatar src={PORTRAITS.hannah} size={72}/>
              <div style={{fontSize:16,color:BRAND.yellow,fontWeight:600,marginTop:8}}>{displayName}</div>
              <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                {MY_INKS.map((ink,i) => <div key={i} style={{width:16,height:16,borderRadius:"50%",background:ink.color}} title={`from ${ink.from}`}/>)}
              </div>
              <div style={{fontSize:9,color:"#444",marginTop:6,fontFamily:FB}}>{MY_INKS.length} inks</div>
            </div>
            {/* Other players */}
            {DEMO_PLAYERS.map(p => (
              <div key={p.id} onClick={()=>setSelectedTarget(selectedTarget===p.id ? null : p.id)} style={{padding:20,borderRadius:8,border:selectedTarget===p.id?`1px solid ${INK_ACCENT}44`:`1px solid ${BRAND.border}`,background:selectedTarget===p.id?"rgba(255,45,85,0.04)":"rgba(255,255,255,0.02)",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
                <Avatar src={p.portrait} size={72}/>
                <div style={{fontSize:16,color:selectedTarget===p.id?"#fff":"#ccc",fontWeight:600,marginTop:8}}>{p.name}</div>
                <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                  {p.inks.map((ink,i) => <div key={i} style={{width:16,height:16,borderRadius:"50%",background:ink.color}} title={`from ${ink.from}`}/>)}
                </div>
                <div style={{fontSize:9,color:"#444",marginTop:6,fontFamily:FB}}>{p.inks.length} ink{p.inks.length!==1?"s":""}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <BuiltOnBadge/>
      {showTour && <TourOverlay onClose={()=>setShowTour(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<F1R3Ink/>);
</script>
</body>
</html>
