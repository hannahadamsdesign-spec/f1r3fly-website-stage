(function() {
  var store = {};
  window.storage = {
    get: function(key, shared) { var v = store[key]; return v !== undefined ? Promise.resolve({ key: key, value: v, shared: !!shared }) : Promise.resolve(null); },
    set: function(key, value, shared) { store[key] = value; return Promise.resolve({ key: key, value: value, shared: !!shared }); },
    delete: function(key, shared) { delete store[key]; return Promise.resolve({ key: key, deleted: true, shared: !!shared }); },
    list: function(prefix, shared) { var keys = Object.keys(store).filter(function(k) { return !prefix || k.startsWith(prefix); }); return Promise.resolve({ keys: keys, prefix: prefix, shared: !!shared }); }
  };
})();

function hSeed(id){let h=0;for(let i=0;i<id.length;i++)h=((h<<5)-h+id.charCodeAt(i))|0;return Math.abs(h)}

function Sigil({seed, size=24}){
  const s=seed%10000, h1=s%360, h2=(s*7+120)%360, r=size*.38;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill={`hsl(${h1},25%,15%)`} stroke={`hsl(${h1},50%,40%)`} strokeWidth="1"/>
      <circle cx={size/2} cy={size/2-r*.3} r={size*.1} fill={`hsl(${h1},70%,65%)`} opacity=".8"/>
      <circle cx={size/2+r*.3} cy={size/2+r*.2} r={size*.08} fill={`hsl(${h2},70%,65%)`} opacity=".7"/>
    </svg>
  );
}

// ── Canvas Shape Controls (in-game, sidebar) ─────────────────────
function CanvasShapeControls({ currentShape, hostName, isHost, isUnlocked, canChange, onChangeShape, onToggleLock, pixelCount }) {
  const [confirmTarget, setConfirmTarget] = useState(null);
  const shapes = Object.entries(SHAPES);
  const handleShapeClick = (key) => {
    if (!canChange || key === currentShape) return;
    const cur = SHAPES[currentShape]; const next = SHAPES[key];
    if (pixelCount > 0 && (next.w < cur.w || next.h < cur.h)) { setConfirmTarget(key); } else { onChangeShape(key); }
  };
  return (
    <div style={{ padding: 12, borderRadius: 6, border: `1px solid ${BRAND.border}`, background: "rgba(0,0,0,0.4)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>CANVAS</div>
        {isHost && (
          <button onClick={onToggleLock} style={{
            background: "none", border: `1px solid ${BRAND.border}`, borderRadius: 4, padding: "3px 8px", cursor: "pointer",
            fontSize: 10, letterSpacing: 1, fontFamily: FH, color: isUnlocked ? BRAND.sage : BRAND.textDim, display: "flex", alignItems: "center", gap: 4,
          }}>{isUnlocked ? "\u{1F513}" : "\u{1F512}"}{isUnlocked ? "OPEN" : "LOCKED"}</button>
        )}
      </div>
      <div style={{ fontSize: 12, color: BRAND.textDim, fontFamily: FB, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ color: BRAND.yellow, fontWeight: 600 }}>{hostName}</span><span>picked</span>
        <span style={{ color: "#fff", fontWeight: 600 }}>{SHAPES[currentShape]?.label}</span>
      </div>
      <div style={{ display: "flex", gap: 4 }}>
        {shapes.map(([key, shape]) => {
          const isActive = currentShape === key;
          const pw = key === "portrait" ? 16 : key === "landscape" ? 24 : 20;
          const ph = key === "portrait" ? 24 : key === "landscape" ? 16 : 20;
          return (
            <button key={key} onClick={() => handleShapeClick(key)} style={{
                flex: 1, background: isActive ? "rgba(243,214,48,0.08)" : "rgba(255,255,255,0.03)",
                border: isActive ? `1px solid ${BRAND.yellow}66` : `1px solid ${BRAND.border}`,
                borderRadius: 6, padding: "8px 4px", cursor: canChange && !isActive ? "pointer" : "default",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                opacity: canChange || isActive ? 1 : 0.4, transition: "all 0.15s ease", position: "relative",
              }}>
              {isActive && !canChange && <div style={{ position: "absolute", top: 2, right: 4, fontSize: 10 }}>{"\u{1F512}"}</div>}
              <div style={{ width: pw, height: ph, border: isActive ? `2px solid ${BRAND.yellow}` : `1px solid rgba(255,255,255,0.15)`, borderRadius: 2 }} />
              <div style={{ fontSize: 9, fontWeight: 600, letterSpacing: 1, fontFamily: FH, color: isActive ? BRAND.yellow : BRAND.textDim }}>{shape.label}</div>
            </button>
          );
        })}
      </div>
      {!isHost && !isUnlocked && <div style={{ marginTop: 8, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontSize: 11, color: BRAND.textDim, fontFamily: FB, fontStyle: "italic" }}>only {hostName} can change shape</div>
        <button style={{ background: "none", border: `1px solid ${BRAND.border}`, borderRadius: 4, padding: "3px 8px", fontSize: 10, fontFamily: FH, letterSpacing: 1, color: BRAND.sky, cursor: "pointer" }}>ASK TO UNLOCK</button>
      </div>}
      {!isHost && isUnlocked && <div style={{ marginTop: 8, fontSize: 11, color: BRAND.sage, fontFamily: FB }}>{hostName} unlocked canvas shape — you can change it</div>}
      {confirmTarget && (
        <div style={{ marginTop: 10, padding: 10, borderRadius: 4, background: "rgba(123,4,41,0.15)", border: "1px solid #7b042966" }}>
          <div style={{ fontSize: 12, color: "#ff6b6b", fontFamily: FB, marginBottom: 8, lineHeight: 1.4 }}>Changing to {SHAPES[confirmTarget]?.label} will cut the canvas. Pixels outside the new bounds will be lost.</div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => { onChangeShape(confirmTarget); setConfirmTarget(null); }} style={{ background: "linear-gradient(135deg, #7b0429, #5c0269)", color: "#fff", border: "none", borderRadius: 4, padding: "6px 12px", fontSize: 11, fontFamily: FH, letterSpacing: 1, cursor: "pointer" }}>RESHAPE</button>
            <button onClick={() => setConfirmTarget(null)} style={{ background: "none", color: BRAND.textDim, border: `1px solid ${BRAND.border}`, borderRadius: 4, padding: "6px 12px", fontSize: 11, fontFamily: FH, letterSpacing: 1, cursor: "pointer" }}>CANCEL</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN GAME
// ══════════════════════════════════════════════════════════════════
function F1R3Pix() {
  const [phase, setPhase] = useState("loading");
  const [myId, setMyId] = useState(null);
  const [myName, setMyName] = useState("");
  const [players, setPlayers] = useState([]);
  const [canvasShape, setCanvasShape] = useState(DEFAULT_SHAPE);
  const [hostId, setHostId] = useState(null);
  const [hostName, setHostName] = useState("");
  const [shapeUnlocked, setShapeUnlocked] = useState(false);
  const gridW = SHAPES[canvasShape]?.w || SHAPES[DEFAULT_SHAPE].w;
  const gridH = SHAPES[canvasShape]?.h || SHAPES[DEFAULT_SHAPE].h;
  const [grid, setGrid] = useState({});
  const [selColor, setSelColor] = useState(PALETTE[8]);
  const [shardOk, setShardOk] = useState(false);
  const [hoverCell, setHoverCell] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [signal, setSignal] = useState(null);
  const [signalConfirm, setSignalConfirm] = useState(false);
  const pollRef = useRef(null);
  const gridContainerRef = useRef(null);

  const buildEmptyGrid = useCallback((w, h) => {
    const g = {}; for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) g[`${x},${y}`] = { color: "#1a1a2e", by: null, ts: 0 }; return g;
  }, []);
  useEffect(() => {
    setGrid(prev => { const g = buildEmptyGrid(gridW, gridH); Object.entries(prev).forEach(([key, px]) => { if (px.by && g[key] !== undefined) g[key] = px; }); return g; });
  }, [canvasShape, gridW, gridH, buildEmptyGrid]);

  const fakeUsers = [
    { id: "sim-claude", name: "Claude", joinedAt: Date.now() - 300000 },
    { id: "sim-gemini", name: "Gemini", joinedAt: Date.now() - 240000 },
    { id: "sim-grok", name: "Grok", joinedAt: Date.now() - 180000 },
    { id: "sim-llama", name: "Llama", joinedAt: Date.now() - 120000 },
    { id: "sim-scarlet", name: "Scarlet", joinedAt: Date.now() - 60000 },
  ];
  const allPlayers = [...players, ...fakeUsers];
  const loadPlayers = useCallback(async () => { const keys = await sh.list(PFX_P); const all = []; for (const k of keys) { const p = await sh.get(k); if (p) all.push(p); } setPlayers(all); return all; }, []);
  const loadGrid = useCallback(async () => { const keys = await sh.list(PFX_PX); const updates = {}; for (const k of keys) { const px = await sh.get(k); if (px) updates[`${px.x},${px.y}`] = px; } setGrid(prev => ({ ...prev, ...updates })); }, []);
  const loadShardSettings = useCallback(async () => {
    const shape = await sh.get(SHARD_SHAPE); if (shape && SHAPES[shape]) setCanvasShape(shape);
    const host = await sh.get(SHARD_HOST); if (host) { setHostId(host.id); setHostName(host.name); }
    const unlocked = await sh.get(SHARD_SHAPE_UNLOCKED); setShapeUnlocked(!!unlocked);
  }, []);
  const syncAll = useCallback(async () => { try { await loadPlayers(); await loadGrid(); await loadShardSettings(); setShardOk(true); } catch { setShardOk(false); } }, [loadPlayers, loadGrid, loadShardSettings]);
  useEffect(() => { (async () => { await loadShardSettings(); const sid = await sh.get(MY_ID, false); if (sid) { const p = await sh.get(`${PFX_P}${sid}`); if (p) { setMyId(sid); setMyName(p.name); await syncAll(); setPhase("play"); return; } } await loadPlayers(); setPhase("join"); })() }, []);
  useEffect(() => { if (phase !== "play") return; pollRef.current = setInterval(syncAll, POLL); return () => clearInterval(pollRef.current); }, [phase, syncAll]);

  const handleJoin = async (name) => {
    const id = `px-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,6)}`;
    await sh.set(`${PFX_P}${id}`, { id, name, joinedAt: Date.now() }); await sh.set(MY_ID, id, false);
    const existingHost = await sh.get(SHARD_HOST);
    if (!existingHost) { await sh.set(SHARD_HOST, { id, name }); await sh.set(SHARD_SHAPE, DEFAULT_SHAPE); setHostId(id); setHostName(name); }
    setMyId(id); setMyName(name); await syncAll(); setPhase("play");
  };
  const handleChangeShape = async (s) => { setCanvasShape(s); await sh.set(SHARD_SHAPE, s); };
  const handleToggleLock = async () => { const v = !shapeUnlocked; setShapeUnlocked(v); await sh.set(SHARD_SHAPE_UNLOCKED, v); };
  const placePixel = async (x, y) => { if (!myId) return; const px = { x, y, color: selColor, by: myId, byName: myName, ts: Date.now() }; await sh.set(`${PFX_PX}${x}-${y}`, px); setGrid(prev => ({ ...prev, [`${x},${y}`]: px })); };
  const leave = async () => { if (myId) { await sh.del(`${PFX_P}${myId}`); await sh.set(MY_ID, null, false); } setMyId(null); setPhase("join"); await loadPlayers(); };

  const handleWheel = useCallback((e) => { e.preventDefault(); setZoom(z => { const next = e.deltaY > 0 ? z - 0.1 : z + 0.1; return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, Math.round(next * 10) / 10)); }); }, []);
  useEffect(() => { const el = gridContainerRef.current; if (!el) return; el.addEventListener("wheel", handleWheel, { passive: false }); return () => el.removeEventListener("wheel", handleWheel); }, [handleWheel, phase]);
  useEffect(() => { if (phase !== "play") return; const sW = window.innerWidth > 768 ? 560 : 0; const vw = window.innerWidth - sW; const vh = window.innerWidth <= 768 ? window.innerHeight * 0.55 : window.innerHeight - 90; const gpw = gridW * (CELL + 1); const gph = gridH * (CELL + 1); const fit = Math.min(vw / gpw, vh / gph, MAX_ZOOM); setZoom(Math.max(MIN_ZOOM, Math.round(fit * 10) / 10)); }, [phase, gridW, gridH]);

  const pixelCount = Object.values(grid).filter(p => p.by).length;
  const isHost = myId === hostId;
  const canChange = isHost || shapeUnlocked;

  if (phase === "loading") return (
    <div style={{ minHeight: "100vh", background: "#000", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <style>{BRAND_FONTS}{`@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}`}</style>
      <div style={{ color: "#fff", fontSize: 16, letterSpacing: 2, fontFamily: FH, animation: "pulse 1.5s ease-in-out infinite" }}>connecting to shard...</div>
    </div>
  );
  if (phase === "join") return <JoinScreen onJoin={handleJoin} players={players} />;
  const hovInfo = hoverCell ? grid[hoverCell] : null;

  // ── GAME VIEW ──────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#000", color: "#fff", fontFamily: FB, display: "flex", flexDirection: "column" }}>
      <div id="top" ref={el => { if (el && window.innerWidth <= 768) el.scrollIntoView(); }} />
      <style>{BRAND_FONTS}{`
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
        *{box-sizing:border-box}
      `}</style>

      {/* Header */}
      <div className="game-header" style={{ padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#000", minHeight: 70 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <span className="game-header-title" style={{ fontSize: 29, fontWeight: 700, letterSpacing: 4, fontFamily: FH, color: "#fff" }}>F1R3<span style={{ color: BRAND.yellow }}>PIX</span></span>
          <span className="game-header-stats" style={{ fontSize: 16, color: "#ccc", letterSpacing: 2, fontFamily: FB }}>{allPlayers.length} players | {pixelCount} pixels | shard {shardOk ? "live" : "offline"}</span>
        </div>
        <div className="zoom-controls" style={{ display: "flex", alignItems: "center", gap: 12, flex: 1, justifyContent: "space-between" }}>
          <button className="tour-btn" style={{ background: "linear-gradient(135deg, #5c0269, #7b0429)", border: "none", color: "#fff", borderRadius: 20, padding: "8px 20px", fontSize: 13, cursor: "pointer", fontFamily: FH, letterSpacing: 2, fontWeight: 600, boxShadow: "0 0 12px rgba(123,4,41,0.3)", flexShrink: 0, marginLeft: 16 }}>TAKE A TOUR</button>
          <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "center" }}>
          <button className="zoom-btn" onClick={() => setZoom(z => Math.max(MIN_ZOOM, Math.round((z - 0.1) * 10) / 10))} style={{ background: "none", border: `1px solid ${BRAND.border}`, color: "#ccc", borderRadius: 4, width: 36, height: 36, fontSize: 22, cursor: "pointer", fontFamily: FH, display: "flex", alignItems: "center", justifyContent: "center" }}>-</button>
          <span style={{ fontSize: 16, color: BRAND.textMuted, fontFamily: FM, minWidth: 50, textAlign: "center" }}>{Math.round(zoom * 100)}%</span>
          <button className="zoom-btn" onClick={() => setZoom(z => Math.min(MAX_ZOOM, Math.round((z + 0.1) * 10) / 10))} style={{ background: "none", border: `1px solid ${BRAND.border}`, color: "#ccc", borderRadius: 4, width: 36, height: 36, fontSize: 22, cursor: "pointer", fontFamily: FH, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          </div>
          <button className="storm-btn" onClick={leave} style={{ background: "none", border: `1px solid ${BRAND.border}`, color: "#ccc", borderRadius: 4, padding: "6px 12px", fontSize: 14, cursor: "pointer", fontFamily: FH, letterSpacing: 1 }}>STORM OUT!</button>
        </div>
      </div>

      {/* Brand gradient stroke — matches f1r3fly.io nav line */}
      <div style={{ width: "100%", height: "0.5px", background: BRAND.stroke, opacity: 0.8 }} />

      <div className="game-layout" style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* Left Sidebar: Canvas + Signals */}
        <div className="game-sidebar game-sidebar-left" style={{ width: 280, borderRight: `1px solid ${BRAND.border}`, padding: "20px 20px", display: "flex", flexDirection: "column", gap: 20, overflowY: "auto", background: "#000" }}>
          <CanvasShapeControls currentShape={canvasShape} hostName={hostName || "host"} isHost={isHost} isUnlocked={shapeUnlocked} canChange={canChange} onChangeShape={handleChangeShape} onToggleLock={handleToggleLock} pixelCount={pixelCount} />

          {/* F1R3 SIGNALS */}
          <div style={{ padding: 12, borderRadius: 6, border: `1px solid ${BRAND.border}`, background: "rgba(0,0,0,0.4)" }}>
            <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH, marginBottom: 8 }}>F1R3 SIGNALS</div>
            <div style={{ fontSize: 14, color: "#ccc", fontFamily: FB, marginBottom: 10, lineHeight: 1.4 }}>How does this F1R3PIX make you feel?</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "12px 6px" }}>
              {[BRAND.yellow, BRAND.sage, BRAND.sky, "#7b0429", "#5c0269", "#009188", "#0c8e23", "#1114ad", "#FFFFFF", "#3f3f3f"].map(c => (
                <div key={`sig-l-${c}`} style={{ width: 22, height: 22, borderRadius: "50%", background: c, cursor: "pointer",
                  border: signal === c ? "2px solid #fff" : "1px solid rgba(255,255,255,0.1)",
                  transition: "transform 0.15s, box-shadow 0.15s", transform: signal === c ? "scale(1.3)" : "scale(1)" }}
                onClick={() => { setSignal(c); setSignalConfirm(true); setTimeout(() => setSignalConfirm(false), 2500); }}
                onMouseEnter={e => { if (signal !== c) { e.target.style.transform = "scale(1.3)"; e.target.style.boxShadow = `0 0 8px ${c}66`; }}}
                onMouseLeave={e => { if (signal !== c) { e.target.style.transform = "scale(1)"; e.target.style.boxShadow = "none"; }}} />
              ))}
            </div>
            {signalConfirm && <div style={{ marginTop: 10, padding: "8px 10px", borderRadius: 4, background: "rgba(243,214,48,0.08)", border: `1px solid ${BRAND.yellow}33`, fontSize: 13, color: BRAND.yellow, fontFamily: FB, lineHeight: 1.4 }}>noted. we wrote that down.</div>}
            {signal && !signalConfirm && <div style={{ marginTop: 10, fontSize: 12, color: BRAND.textDim, fontFamily: FB, display: "flex", alignItems: "center", gap: 6 }}>{myName}'s signal: <div style={{ width: 12, height: 12, borderRadius: "50%", background: signal, border: "1px solid rgba(255,255,255,0.2)" }} /></div>}
            <div style={{ marginTop: 10, fontSize: 13, color: BRAND.textDim, fontFamily: FB, fontStyle: "italic" }}>powered by F1R3INK</div>
          </div>
        </div>

        {/* Grid */}
        <div ref={gridContainerRef} className="game-grid-wrap" style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 8, overflow: "auto", background: "#000" }}>
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${gridW}, ${CELL}px)`, gap: 1, background: "rgba(255,255,255,0.08)", padding: 1, borderRadius: 4, transform: `scale(${zoom})`, transformOrigin: "center center", transition: "transform 0.1s ease-out" }}>
            {Array.from({ length: gridH }, (_, y) =>
              Array.from({ length: gridW }, (_, x) => {
                const key = `${x},${y}`; const px = grid[key];
                return (
                  <div key={key} onClick={() => placePixel(x, y)} onMouseEnter={() => setHoverCell(key)} onMouseLeave={() => setHoverCell(null)}
                    style={{ width: CELL, height: CELL, background: px?.color || "#1a1a2e", cursor: "pointer", transition: "background .1s", outline: hoverCell === key ? `2px solid ${selColor}` : "none", outlineOffset: -2, borderRadius: 1 }} />
                );
              })
            )}
          </div>
        </div>

        {/* Sidebar — wider (240px), more breathing room */}
        <div className="game-sidebar" style={{ width: 280, borderLeft: `1px solid ${BRAND.border}`, padding: "20px 20px", display: "flex", flexDirection: "column", gap: 20, overflowY: "auto", background: "#000" }}>
          <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>PALETTE</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "12px 6px" }}>
            {PALETTE.map(c => (
              <div key={c} onClick={() => setSelColor(c)} style={{ width: 28, height: 28, borderRadius: 4, background: c, cursor: "pointer",
                border: selColor === c ? "2px solid #fff" : c === "#000000" ? "1px solid #333" : "1px solid transparent",
                transition: "transform .1s", transform: selColor === c ? "scale(1.15)" : "scale(1)" }} />
            ))}
          </div>

          <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>ACTIVE</div>
          <div style={{ fontSize: 16, color: "#ccc", fontFamily: FB }}>Selected: <span style={{ color: selColor, fontWeight: 600 }}>{selColor}</span></div>
          {hovInfo?.by && <div style={{ fontSize: 16, color: "#ccc", fontFamily: FB }}>by: {hovInfo.byName || "?"}<br />{new Date(hovInfo.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>}

          <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH, marginTop: 8 }}>PLAYERS</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {allPlayers.map(p => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6, opacity: p.id === myId ? 1 : .6 }}>
                <Sigil seed={hSeed(p.id)} size={18} />
                <span style={{ fontSize: 16, color: p.id === myId ? BRAND.yellow : "#ccc", fontFamily: FB }}>
                  {p.name}{p.id === hostId && <span style={{ fontSize: 12, color: BRAND.textDim, marginLeft: 4, fontStyle: "italic" }}>(Host)</span>}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <BuiltOnBadge />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(F1R3Pix));
</script>
</body>
</html>
